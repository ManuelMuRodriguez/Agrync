services:

    mongodb:
        image: mongo:latest
        ports:
            - "27020:27017"
        networks:
            - fiware
    orion:
        image: telefonicaiot/fiware-orion:latest
        depends_on:
            - mongodb
        ports:
            - "1026:1026"
        networks:
            - fiware
        environment:
            - ORION_MONGO_URI=mongodb://mongodb:27017

networks:
  fiware:
    driver: bridge