name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agrync_backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        run: python -m pytest --tb=short -q

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agrync_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agrync_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agrync_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agrync_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npx playwright test --config playwright.config.cjs

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit, frontend-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build agrync_backend

      - name: Build frontend image
        run: docker build agrync_frontend
